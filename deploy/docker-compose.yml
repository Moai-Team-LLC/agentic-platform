# The Agentic Platform — the whole stack as durable containers, wired.
# Run:  docker compose -f deploy/docker-compose.yml --env-file .env up -d --build
# (the `agentic` CLI wraps this). Every LLM call flows through the gateway; every
# trace into AgenticPerformance. Products' own Dockerfiles are reused where they
# ship them (Mind, APL); Gateway/Console use inline Dockerfiles. Bifrost config is
# platform-owned (deploy/bifrost.config.json) — the vendored repo is never touched.

name: agentic-platform

x-embed: &embed-cache ${EMBED_CACHE_DIR:-/tmp/agentic-embed}:/embed-cache

services:
  # ── data plane ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  bifrost:
    image: maximhq/bifrost:v1.6.2
    restart: unless-stopped
    depends_on: [redis]
    environment:
      OPENAI_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ./bifrost.config.json:/app/data/config.json:ro
    ports: ["127.0.0.1:8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    restart: unless-stopped
    depends_on:
      bifrost: { condition: service_healthy }
    build:
      context: ../vendor/AgenticGateway
      dockerfile_inline: |
        FROM oven/bun:1.3.11
        WORKDIR /app
        COPY package.json bun.lock* ./
        RUN bun install --frozen-lockfile || bun install
        COPY . .
        CMD ["bun","run","src/cli.ts","serve"]
    environment:
      AGW_PORT: "8787"
      AGW_DB_PATH: /data/agw.db
      BIFROST_URL: http://bifrost:8080
      AGW_VAULT_KEY: ${AGW_VAULT_KEY:?set AGW_VAULT_KEY}
      # NOTE: keep "false". This does NOT disable auth — an unknown key is still
      # rejected (401). It only controls whether each tenant must have its OWN
      # vaulted upstream credential; "true" breaks the platform's env-key
      # passthrough (tenant has no vaulted cred). LAN exposure is closed by the
      # 127.0.0.1 port binds, so requiring VK adds no real protection here.
      AGW_REQUIRE_VK: "false"
      AGW_EVIDENCE_SINK: file
      AGW_EVIDENCE_FILE: /data/evidence.jsonl
      OPENAI_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes: ["gateway-data:/data"]
    ports: ["127.0.0.1:8787:8787"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── embeddings: a dedicated bge-m3 server (same model, 1024-dim) so Mind
  #    doesn't hold a ~2.3 GB model in-process. Ollama unloads it when idle. ──
  embeddings:
    image: ollama/ollama:0.5.7
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_KEEP_ALIVE: "10m"
    volumes: ["ollama-models:/root/.ollama"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull bge-m3 || true
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q bge-m3"]
      interval: 5s
      timeout: 5s
      retries: 120
    mem_limit: 2g

  # ── AgenticMind: knowledge & memory ────────────────────────
  mind-db:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment: { POSTGRES_PASSWORD: mysecretpassword }
    volumes:
      - mind-pgdata:/home/postgres/pgdata
      - ../vendor/AgenticMind/scripts/db-init:/docker-entrypoint-initdb.d:ro
    ports: ["127.0.0.1:5435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  mind-migrate:
    depends_on:
      mind-db: { condition: service_healthy }
    build: { context: ../vendor/AgenticMind, dockerfile: Dockerfile.server }
    working_dir: /app
    entrypoint: ["bunx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@mind-db:5432/postgres
    restart: "no"

  mind-server:
    restart: unless-stopped
    mem_limit: 1500m
    depends_on:
      mind-migrate: { condition: service_completed_successfully }
      gateway: { condition: service_started }
      embeddings: { condition: service_healthy }
    build: { context: ../vendor/AgenticMind, dockerfile: Dockerfile.server }
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@mind-db:5432/postgres
      DATABASE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      CHAT_BASE_URL: http://gateway:8787/v1
      CHAT_API_KEY: ${MIND_GATEWAY_KEY:-platform}
      CHAT_MODEL_SIMPLE: openrouter/openai/gpt-4o-mini
      CHAT_MODEL_COMPLEX: openrouter/openai/gpt-4o
      KNOWLEDGE_CARDS_ENABLED: "true"
      KNOWLEDGE_CACHE_ENABLED: "true"
      KNOWLEDGE_GRAPHRAG_ENABLED: "false"
      # embeddings served by the dedicated bge-m3 service (same model, 1024-dim)
      EMBED_PROVIDER: openai
      EMBED_BASE_URL: http://embeddings:11434/v1
      EMBED_API_KEY: ollama
      EMBED_MODEL: bge-m3
      OTEL_EXPORTER_OTLP_ENDPOINT: http://apl-ingest:4319
      OTEL_SERVICE_NAME: agenticmind
      PORT: "3000"
    ports: ["127.0.0.1:3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 40

  mind-worker:
    restart: unless-stopped
    mem_limit: 700m
    depends_on:
      mind-migrate: { condition: service_completed_successfully }
      embeddings: { condition: service_healthy }
    build: { context: ../vendor/AgenticMind, dockerfile: Dockerfile.worker }
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@mind-db:5432/postgres
      DATABASE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET}
      CHAT_BASE_URL: http://gateway:8787/v1
      CHAT_API_KEY: ${MIND_GATEWAY_KEY:-platform}
      CHAT_MODEL_SIMPLE: openrouter/openai/gpt-4o-mini
      CHAT_MODEL_COMPLEX: openrouter/openai/gpt-4o
      EMBED_PROVIDER: openai
      EMBED_BASE_URL: http://embeddings:11434/v1
      EMBED_API_KEY: ollama
      EMBED_MODEL: bge-m3

  # ── AgenticPerformance: evals & observability ──────────────
  apl-db:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment: { POSTGRES_PASSWORD: postgres }
    volumes: ["apl-pgdata:/home/postgres/pgdata"]
    ports: ["127.0.0.1:5439:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  apl-migrate:
    depends_on:
      apl-db: { condition: service_healthy }
    build: { context: ../vendor/AgenticPerformance, dockerfile: apps/ingest/Dockerfile }
    entrypoint: ["bunx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@apl-db:5432/postgres
    restart: "no"

  apl-ingest:
    restart: unless-stopped
    depends_on:
      apl-migrate: { condition: service_completed_successfully }
    build: { context: ../vendor/AgenticPerformance, dockerfile: apps/ingest/Dockerfile }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@apl-db:5432/postgres
      PORT: "4319"
    ports: ["127.0.0.1:4319:4319"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4319/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30

  apl-worker:
    restart: unless-stopped
    depends_on:
      apl-migrate: { condition: service_completed_successfully }
    build: { context: ../vendor/AgenticPerformance, dockerfile: apps/worker/Dockerfile }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@apl-db:5432/postgres
      APL_CHAT_BASE_URL: http://gateway:8787/v1
      APL_CHAT_API_KEY: ${MIND_GATEWAY_KEY:-platform}

  # ── the console: one pane ──────────────────────────────────
  console:
    restart: unless-stopped
    depends_on:
      mind-server: { condition: service_started }
      apl-ingest: { condition: service_started }
      gateway: { condition: service_started }
    build:
      context: ..
      dockerfile_inline: |
        FROM oven/bun:1.3.11
        WORKDIR /app
        COPY console/bff/ ./bff/
        COPY console/web/ ./web/
        WORKDIR /app/bff
        CMD ["bun","run","server.ts"]
    environment:
      CONSOLE_PORT: "4600"
      MIND_URL: http://mind-server:3000
      GATEWAY_URL: http://gateway:8787
      BIFROST_URL: http://bifrost:8080
      APL_URL: http://apl-ingest:4319
      SELFHEAL_URL: http://selfheal:3000
      OPS_URL: http://ops-runner:4700
      MIND_TOKEN: ${HEARTBEAT_TOKEN:-}
      MIND_PG_HOST: mind-db
      MIND_PG_PORT: "5432"
      APL_PG_HOST: apl-db
      APL_PG_PORT: "5432"
      GATEWAY_EVIDENCE_FILE: /gateway-data/evidence.jsonl
      MANIFEST_SARIF: /run-data/agenticmind.sarif
    volumes:
      - gateway-data:/gateway-data:ro
      - ../.run:/run-data:ro
    ports: ["127.0.0.1:4600:4600"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4600/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── AgenticSelfHealingCode: self-healing ops ───────────────
  sho-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment: { POSTGRES_PASSWORD: sho, POSTGRES_DB: sho }
    volumes: ["sho-pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sho"]
      interval: 5s
      timeout: 5s
      retries: 20

  selfheal:
    restart: unless-stopped
    depends_on:
      sho-db: { condition: service_healthy }
    build:
      context: ../vendor/AgenticSelfHealingCode
      dockerfile_inline: |
        FROM oven/bun:1.3.11
        WORKDIR /app
        COPY . .
        RUN bun install --frozen-lockfile || bun install
        CMD ["sh","-c","bun run migrate && bun run start"]
    environment:
      DATABASE_URL: postgres://postgres:sho@sho-db:5432/sho
      SIGNAL_SECRET: "${SIGNAL_SECRET:?set SIGNAL_SECRET — run agentic up}"
      # incident pager → Telegram (outbound). Empty = adapter stays "none".
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      PORT: "3000"
    ports: ["127.0.0.1:3100:3000"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── auto-refresh: a scheduler that periodically re-red-teams the family,
  #    so the Security pane stays current with zero manual `agentic demo`. ──
  refresher:
    restart: unless-stopped
    build:
      context: ../vendor/AgenticAssurance
      dockerfile_inline: |
        FROM oven/bun:1.3.11
        WORKDIR /app
        COPY . .
        RUN bun install --frozen-lockfile || bun install
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[refresher] every ${REFRESH_INTERVAL:-120}s: scan the family";
        while true; do
          bun run cli -- scan /manifests/agenticmind.json --sarif /run-data/agenticmind.sarif --report /run-data/agenticmind.md >/dev/null 2>&1 || true;
          date -u +"%Y-%m-%dT%H:%M:%SZ" > /run-data/last-refresh.txt;
          sleep ${REFRESH_INTERVAL:-120};
        done
    volumes:
      - ../examples/manifests:/manifests:ro
      - ../.run:/run-data

  # ── AgenticOps: a live demo fleet, so the console has real runtime telemetry ──
  ops-runner:
    restart: unless-stopped
    build:
      context: ../vendor/AgenticOps
      dockerfile_inline: |
        FROM oven/bun:1.3.11
        WORKDIR /app
        COPY package.json bun.lock* ./
        RUN bun install --frozen-lockfile || bun install
        COPY . .
    volumes:
      - ../services/ops-runner/server.ts:/app/server.ts:ro
    environment:
      PORT: "4700"
      MIND_URL: http://mind-server:3000
      MIND_TOKEN: ${HEARTBEAT_TOKEN:-}
      GATEWAY_URL: http://gateway:8787
      GATEWAY_KEY: ${MIND_GATEWAY_KEY:-}
      GATEWAY_MODEL: openrouter/openai/gpt-4o-mini
      FLEET_CRON: ${FLEET_CRON:-*/10 * * * *}
    command: ["bun", "run", "server.ts"]
    ports: ["127.0.0.1:4700:4700"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:4700/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── heartbeat: periodically asks Mind a question so traces + cost stay live ──
  heartbeat:
    image: oven/bun:1.3.11
    restart: unless-stopped
    depends_on:
      mind-server: { condition: service_started }
    volumes:
      - ../services/heartbeat/loop.ts:/loop.ts:ro
    environment:
      MIND_URL: http://mind-server:3000
      HEARTBEAT_TOKEN: ${HEARTBEAT_TOKEN:-}
      INTERVAL: "180"
    command: ["bun", "run", "/loop.ts"]

volumes:
  mind-pgdata:
  apl-pgdata:
  gateway-data:
  sho-pgdata:
  ollama-models:
